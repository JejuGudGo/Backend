name: Deploy to EC2

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: environment  # GitHub Environments 이름

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17' # Java 17 설치
          distribution: 'temurin' # OpenJDK 배포판

      - name: Verify Java version
        run: java -version # Java 버전 확인

      - name: Set up environment variables
        env:
          DOCKER_COMPOSE_ENABLED: ${{ secrets.DOCKER_COMPOSE_ENABLED }}
          MAIL_ID: ${{ secrets.MAIL_ID }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          DATASOURCE_URL: ${{ secrets.DATASOURCE_URL }}
          DATASOURCE_USERNAME: ${{ secrets.DATASOURCE_USERNAME }}
          DATASOURCE_PASSWORD: ${{ secrets.DATASOURCE_PASSWORD }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          COOLSMS_KEY: ${{ secrets.COOLSMS_KEY }}
          COOLSMS_SECRET_KEY: ${{ secrets.COOLSMS_SECRET_KEY }}
          SEND_NUMBER: ${{ secrets.SEND_NUMBER }}
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
        run: echo "Environment variables are set."

      - name: Build application
        run: ./gradlew build

      - name: Upload artifact to EC2
        env:
          EC2_USER: ubuntu
          EC2_HOST: 43.203.169.18
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ec2-key.pem
          chmod 600 ec2-key.pem
          scp -o StrictHostKeyChecking=no -i ec2-key.pem build/libs/myapp.jar $EC2_USER@$EC2_HOST:/home/ubuntu/myapp.jar

      - name: Install dependencies on EC2
        env:
          EC2_USER: ubuntu
          EC2_HOST: 43.203.169.18
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ec2-key.pem
          chmod 600 ec2-key.pem
          ssh -i ec2-key.pem $EC2_USER@$EC2_HOST << EOF
          sudo apt update
          sudo apt install -y openjdk-17-jdk redis
          curl -fsSL https://deb.nodesource.com/setup_16.x | sudo -E bash -
          sudo apt install -y nodejs
          sudo npm install -g pm2
          EOF

      - name: Start application with PM2
        env:
          EC2_USER: ubuntu
          EC2_HOST: 43.203.169.18
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ec2-key.pem
          chmod 600 ec2-key.pem
          ssh -i ec2-key.pem $EC2_USER@$EC2_HOST << EOF
          pm2 stop myapp || true
          pm2 start "java -jar /home/ubuntu/myapp.jar" --name myapp
          pm2 save
          EOF
